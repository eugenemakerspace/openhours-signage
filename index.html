<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eugene Makerspace - Open Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <img src="assets/ems-logo.svg" alt="Eugene Makerspace" class="header-logo">
  </header>

  <main class="dashboard">
    <section class="panel panel-calendar">
      <h2 class="panel-title">Open Hours</h2>
      <div class="panel-content">
        <iframe
          src="https://calendar.google.com/calendar/embed?src=c_ce674574ced32a95fd95e1e5c6b5db66ffc11e188c433ac79a4ed57544d35543%40group.calendar.google.com&ctz=America%2FLos_Angeles&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
          class="calendar-iframe"
          frameborder="0"
          scrolling="no"
        ></iframe>
      </div>
    </section>

    <section class="panel panel-sidebar">
      <div class="sidebar-events">
        <h2 class="panel-title">Upcoming Events</h2>
        <div class="panel-content">
          <iframe
            src="https://calendar.google.com/calendar/embed?mode=AGENDA&src=eugenemakerspace%40gmail.com&ctz=America%2FLos_Angeles&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
            class="events-iframe"
            frameborder="0"
            scrolling="no"
          ></iframe>
        </div>
      </div>

      <div class="sidebar-qr">
        <p class="qr-label">Scan for more info</p>
        <div class="qr-placeholder">
          <svg class="qr-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="200" fill="#ffffff" rx="8"/>
            <rect x="20" y="20" width="60" height="60" fill="#000" rx="4"/>
            <rect x="28" y="28" width="44" height="44" fill="#fff" rx="2"/>
            <rect x="36" y="36" width="28" height="28" fill="#000" rx="2"/>
            <rect x="120" y="20" width="60" height="60" fill="#000" rx="4"/>
            <rect x="128" y="28" width="44" height="44" fill="#fff" rx="2"/>
            <rect x="136" y="36" width="28" height="28" fill="#000" rx="2"/>
            <rect x="20" y="120" width="60" height="60" fill="#000" rx="4"/>
            <rect x="28" y="128" width="44" height="44" fill="#fff" rx="2"/>
            <rect x="36" y="136" width="28" height="28" fill="#000" rx="2"/>
            <rect x="90" y="90" width="20" height="20" fill="#000" rx="2"/>
            <rect x="120" y="90" width="20" height="20" fill="#000" rx="2"/>
            <rect x="150" y="90" width="20" height="20" fill="#000" rx="2"/>
            <rect x="90" y="120" width="20" height="20" fill="#000" rx="2"/>
            <rect x="120" y="120" width="20" height="60" fill="#000" rx="2"/>
            <rect x="150" y="150" width="30" height="30" fill="#000" rx="2"/>
            <rect x="90" y="150" width="20" height="30" fill="#000" rx="2"/>
            <text x="100" y="108" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">PLACEHOLDER</text>
          </svg>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
